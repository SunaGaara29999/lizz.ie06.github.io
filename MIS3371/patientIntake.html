<html>
<head>
    <meta charset="utf-8">
    <title>Patient Intake Form 1</title>
    <!-- Load external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id = "header"> 
    <table width = "100%">
        <tr>
            <td style = "width:15%"></td>
            <td class="logo-cell">
                <img
                    id="Logo"
                    src="ImageMedic.png"
                    alt="Rod of Asclepious">
            </td>
            <td id="title"><h1>Aleman Medical Services</h1></td>
            <td><h3>Today's date is:<br><span id="date">date</span></h3></td>
        </tr>
    </table>
    </div> 
<div id="body">
<form action="submitForm.html" method="get">
    <table class="intake" width="100%">
            <tr class="intake">
                <th class="intake" colspan="2"><h2>Patient Intake Form</h2></th>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="firstname">First Name,</label>
                    <label for="middleinit">Mid Initial,</label>
                    <label for="lastname">Last Name:</label>
                </td>
                <td>
                    <input type="text"
                            maxlength="30" 
                            id="firstname" 
                            name="firstname" 
                            required
                            oninvalid="this.setCustomValidity('First Name Required')"
                            oninput="this.setCustomValidity('')"
                            placeholder="First Name (required)">
                    <input type="text" 
                            maxlength="1" 
                            id="midinit" 
                            name="midinit" 
                            placeholder="M">
                    <input type="text"
                            maxlength="30" 
                            id="lastname" 
                            name="lastname" 
                            required
                            oninvalid="this.setCustomValidity('Last Name Required')"
                            oninput="this.setCustomValidity('')"
                            placeholder="Last Name (required)">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="birthdate">Date of Birth:</label>
                </td>
                <td>
                    <input type="date" 
                            id="birthdate" 
                            name="birthdate" 
                            required
                            oninvalid="this.setCustomValidity('Birthdate Required')"
                            oninput="this.setCustomValidity('')">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="gender">Gender:</label>
                </td>
                <td>
                    <input type="radio" 
                            id="gender1" 
                            name="gender" 
                            value="Male">
                        Male
                    <input type="radio" 
                            id="gender2" 
                            name="gender" 
                            value="Female">
                        Female
                    <input type="radio" 
                            id="gender3" 
                            name="gender" 
                            value="Other">
                        Other
                    <span id="gender_text">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="social Security">Social Security Number:</label>
                </td>
                <td>
                    <input type="password" 
                            minlength="9"
                            maxlength="11"
                            id="socialSecurity" 
                            name="socialSecurity" 
                            required
                            oninvalid="this.setCustomValidity('Social Security Number Required')"
                            oninput="this.setCustomValidity('')"
                            placeholder="123-45-6789">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="addr1" >Address Line 1:</label>
                </td>
                <td>
                    <input type="text" 
                            maxlength="30" 
                            id="addr1" 
                            name="addr1" 
                            required
                            oninvalid="this.setCustomValidity('A Minimum of 1 address line Required')"
                            oninput="this.setCustomValidity('')"
                            placeholder="5555 Main St (required)">
                    <span id="address1">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="addr2">Address Line 2:</label>
                </td>
                <td>
                    <input type="text" 
                            maxlength="30" 
                            id="addr2" 
                            name="addr2" 
                            placeholder="Apt, Suite, Bldg, etc.">
                    <span id="address2">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="city">City,</label>
                    <label for="state">State,</label>
                    <label for="zip">Zip:</label>
                </td>
                <td>
<!--City was referenced from example of Homework 1-->
                    <input type="text"
                            size="10" 
                            maxlength="30" 
                            id="city" 
                            name="city" 
                            required
                            oninvalid="this.setCustomValidity('City required')"
                            oninput="this.setCustomValidity('')"
                            placeholder="City(required)">
                    <select required>
                        <option value=""></option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="DC">District Of Columbia</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="HI">Hawaii</option>
                        <option value="ID">Idaho</option>
                        <option value="IL">Illinois</option>
                        <option value="IN">Indiana</option>
                        <option value="IA">Iowa</option>
                        <option value="KS">Kansas</option>
                        <option value="KY">Kentucky</option>
                        <option value="LA">Louisiana</option>
                        <option value="ME">Maine</option>
                        <option value="MD">Maryland</option>
                        <option value="MA">Massachusetts</option>
                        <option value="MI">Michigan</option>
                        <option value="MN">Minnesota</option>
                        <option value="MS">Mississippi</option>
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>
                        <option value="NH">New Hampshire</option>
                        <option value="NJ">New Jersey</option>
                        <option value="NM">New Mexico</option>
                        <option value="NY">New York</option>
                        <option value="NC">North Carolina</option>
                        <option value="ND">North Dakota</option>
                        <option value="OH">Ohio</option>
                        <option value="OK">Oklahoma</option>
                        <option value="OR">Oregon</option>
                        <option value="PA">Pennsylvania</option>
                        <option value="RI">Rhode Island</option>
                        <option value="SC">South Carolina</option>
                        <option value="SD">South Dakota</option>
                        <option value="TN">Tennessee</option>
                        <option value="TX">Texas</option>
                        <option value="UT">Utah</option>
                        <option value="VT">Vermont</option>
                        <option value="VA">Virginia</option>
                        <option value="WA">Washington</option>
                        <option value="WV">West Virginia</option>
                        <option value="WI">Wisconsin</option>
                        <option value="WY">Wyoming</option>
                    </select>
<!--Also reference the zip code field from HW 1-->
                    <input type="text" 
                        pattern="[0-9]{5}"
                        minlength="5"
                        maxlength="10" 
                        id="zip" 
                        name="zip" 
                        required
                        oninvalid="this.setCustomValidity('Zip/Postal Code required')"
                        oninput="this.setCustomValidity('')"
                        placeholder="12345(required)">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="email">Email:</label>
                </td>
                <td>
                    <input type="email" 
                            id="email" 
                            name="email" 
                            placeholder="abcd@gmail.com">
                </td>
            </tr>
            <tr class= "intake">
                <td align="right">
                    <label for="phone">Phone Number #:</label>
                </td>
                <td>
                    <input type="text" 
                            size="10" 
                            maxlength="10" 
                            id="phone" 
                            name="phone" 
                            placeholder="(555)555-5555">
                </td>
            </tr>
            <tr class="intake">
                <td id = "MedicHistory" rowspan="2" align="right">
                    <label for="MedicHistory">Choose the following that apply:</label>
                </td>
                <td>
                    <input type="checkbox"
                            id="option1" 
                            name="mhistory" 
                            value="Heart Disease">
                        Heart Disease
                    <input type="checkbox" 
                            id="option2" 
                            name="mhistory" 
                            value="High Chrolesterol">
                        High Cholesterol
                    <input type="checkbox" 
                            id="option3" 
                            name="mhistory" 
                            value="Thyroid Disease">
                        Thyroid Disease
                        <span id="mhistory_text">
                </td> 
            </tr>
            <tr class="intake">
                <td>
                    <input type="checkbox" 
                            id="option4" 
                            name="mhistory" 
                            value="Asthma">
                        Asthma
                    <input type="checkbox" 
                            id="option5" 
                            name="mhistory" 
                            value="Hypertension">
                        Hypertension
                    <input type="checkbox" 
                            id="option6" 
                            name="mhistory" 
                            value="Diabetes">
                        Diabetes
                    <span id="mhistory_text">
                </td> 
            <tr class="intake">
                <td align="right">
                    <label for="description">Describe your Symptoms:</label>
                </td>
                <td>
                    <textarea 
                    rows="3" 
                    cols="50" 
                    maxlength="500"
                    id="description" 
                    name="description" 
                    placeholder="Describe your symptoms here..."></textarea>
                </td>
            </tr>
            <tr class="intake"> 
                <td align="right">
                    <label for="wellness">From 1-10 How are you feeling?</label>
                </td>
                <td align="left">&nbsp;1  
                    <input type="range" 
                            class="slider"
                            id="wellness" 
                            name="wellness"                 
                            step="1"
                            min="1" 
                            max="10">
                            10&nbsp;<br>
            <span id="rangedisplay" text-align="center"></span>
        </td>
    </tr>  
    <tr class="intake">
                <td align="right">
                    <label for="vaccination">Are your vaccines up to date?</label>
                </td>
                <td>
                    <input type="radio" 
                            id="vaccination1" 
                            name="vaccination" 
                            value="Yes">
                        Yes
                    <input type="radio" 
                            id="vaccination2" 
                            name="vaccination" 
                            value="No">
                        No  
                </td>
            </tr>  
            <tr class="intake">
                <td align="right">
                    <label for="billing">Are you paying out of pocket?</label>
                </td>
                <td>
                    <input type="radio" 
                            id="billing1" 
                            name="billing" 
                            value="Yes">
                        Yes
                    <input type="radio" 
                            id="billing2" 
                            name="billing" 
                            value="No">
                        No  
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="username">Username:</label>
                </td>
                <td>
                    <input type="text" 
                            minlength="1"
                            maxlength="20"
                            id="username" 
                            name="username" 
                            required
                            oninvalid="this.setCustomValidity('Username Required')"
                            oninput="this.setCustomValidity('')"
                            placeholder="Enter your username">
                </td>
            </tr> 
            <tr class="intake">
                <td align="right">
                    <label for="password">Password:</label>
                </td>
                <td>
                    <input type="password" 
                            minlength="8"
                            maxlength="25"
                            id="password" 
                            name="password"
                            required 
                            placeholder="Must be 8-25 characters"
                            oninvalid="this.setCustomValidity('Password Required')"
                            oninput="this.setCustomValidity('')">
                </td>
            </tr>
            <tr class="intake">
                <td align="right">
                    <label for="re-enter">Re-enter Password:</label>
                </td>
                <td>
                    <input type="password" 
                            minlength="8"
                            maxlength="25"
                            id="re-enter" 
                            name="re-enter"
                            required 
                            placeholder="Re-enter your password"
                            oninvalid="this.setCustomValidity('Please re-enter your password')"
                            oninput="this.setCustomValidity('')">
                </td>
            </tr>     
            <tr class="intake">        
                <td colspan="3">
            <center>
            <input type="submit">
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="reset">
            </center>
        </td>
    </tr>
    </table>
</form>

        </div>
        <div id="footer">
        <table width = "100%">
        <tr>
            <td class="footer" align="left">
            Aleman Medical Services <br>
            1234 Sesame Street 56789 <br>
            (555) 555-5555 
            </td>   
            <td align="left">
                <button class="btn btn-primary">Contact Us</button>
            </td>
        </tr>
        </table>
        </div>
<script>
    document.getElementById("date").innerHTML = new Date().toLocaleDateString();
</script>
</body>
</html>
